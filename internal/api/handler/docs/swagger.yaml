      tags:
      - TV Shows
  /users:
    post:
      consumes:
      - application/json
      description: Create a new user account. If no users exist, this request is open
        and makes the user an Admin. Otherwise, it requires Admin JWT.
      parameters:
      - description: User creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Invalid request body or missing fields
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden (requires Admin status)
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Username or email already in use
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create User (First-run or Admin Only)
      tags:
      - User Profile
  /worker/heartbeat:
    post:
      description: Submit worker status heartbeat. If the worker has capacity, claims
        and returns the next pending transcode job.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.heartbeatResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - WorkerAuth: []
      summary: Worker Heartbeat
      tags:
      - Worker Interface
  /worker/jobs/{id}/bundle:
    post:
      consumes:
      - multipart/form-data
      description: Upload completed MPEG-DASH output files as a ZIP bundle. The server
        extracts the bundle, creates sidecar metadata, and updates job status to completed.
      parameters:
      - description: Job ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: The ZIP bundle file containing transcode outputs (segments, manifest,
          etc.)
        in: formData
        name: bundle
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 'Returns {''status'': ''ok''}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid job ID or multipart form
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Job not assigned to this worker
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Job not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - WorkerAuth: []
      summary: Upload Transcode Output Bundle
      tags:
      - Worker Interface
  /worker/jobs/{id}/progress:
    post:
      consumes:
      - application/json
      description: Update progress (0-100) or report failures of the currently assigned
        transcode job.
      parameters:
      - description: Job ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Progress update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.progressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Returns {''status'': ''ok''}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body or job ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Job not assigned to this worker
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Job not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - WorkerAuth: []
      summary: Update Job Progress
      tags:
      - Worker Interface
  /worker/media/{id}/download:
    get:
      description: Download the original raw media source file for transcoding.
      parameters:
      - description: Media ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - video/mp4
      - video/quicktime
      - video/x-matroska
      - application/octet-stream
      responses:
        "200":
          description: Raw media source file
          schema:
            type: file
        "400":
          description: Invalid media ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Media item not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - WorkerAuth: []
      summary: Download Source Video
      tags:
      - Worker Interface
  /worker/register:
    post:
      consumes:
      - application/json
      description: Register an ephemeral remote transcode worker using a registration
        token.
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerWorkerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.registerWorkerResponse'
        "400":
          description: Invalid request or token name missing
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid registration token
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register Ephemeral Transcode Worker
      tags:
      - Worker Interface
securityDefinitions:
  BearerAuth:
    description: Type "Bearer <your-token>" to authenticate.
    in: header
    name: Authorization
    type: apiKey
  WorkerAuth:
    description: The secret API Key assigned to the transcode worker.
    in: header
    name: X-Worker-API-Key
    type: apiKey
swagger: "2.0"
