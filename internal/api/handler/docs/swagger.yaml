          description: Unauthenticated
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List TV Seasons
      tags:
      - TV Shows
  /tv/shows/{id}/seasons/{number}/episodes:
    get:
      description: Retrieve all episodes (returned as MediaItems) for a specific season
        of a show.
      parameters:
      - description: TV Show ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Season Number
        in: path
        name: number
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.MediaItem'
            type: array
        "400":
          description: Invalid inputs
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthenticated
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Season not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
