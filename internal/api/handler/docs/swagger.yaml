basePath: /api/v1
definitions:
  handler.IndexResponse:
    properties:
      summaries:
        items:
          $ref: '#/definitions/handler.IndexSummaryResponse'
        type: array
      total:
        type: integer
    type: object
  handler.IndexSummaryResponse:
    properties:
      errors:
        type: integer
      media_items_created:
        type: integer
      registered:
        type: integer
      removed:
        type: integer
      storage_area_id:
        type: string
      storage_area_path:
        type: string
      updated:
        type: integer
    type: object
  handler.bulkEnqueueRequest:
    properties:
      filter:
        type: string
    type: object
  handler.createEphemeralTokenRequest:
    properties:
      name:
        type: string
    type: object
  handler.createLibraryRequest:
    properties:
      media_type:
        type: string
      path:
        type: string
    type: object
  handler.createUserRequest:
    properties:
      email:
        type: string
      is_admin:
        type: boolean
      password:
        type: string
      username:
        type: string
    type: object
  handler.createWorkerRequest:
    properties:
      name:
        type: string
    type: object
  handler.heartbeatResponse:
    properties:
      hwaccel:
        type: string
      job:
        $ref: '#/definitions/models.TranscodeJob'
      threads:
        type: integer
    type: object
  handler.loginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  handler.loginResponse:
    properties:
      access_token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  handler.nowPlayingResponse:
    properties:
      history:
        $ref: '#/definitions/models.WatchHistory'
      media:
        $ref: '#/definitions/models.MediaItem'
    type: object
  handler.progressRequest:
    properties:
      error_msg:
        type: string
      progress:
        type: number
      status:
        description: '"processing" or "failed"'
        type: string
    type: object
  handler.registerWorkerRequest:
    properties:
      name:
        type: string
      token:
        type: string
    type: object
  handler.registerWorkerResponse:
    properties:
      api_key:
        type: string
    type: object
  handler.setupRequest:
    properties:
      cast_receiver_app_id:
        type: string
      password:
        type: string
      segments_dir:
        type: string
      thumbs_dir:
        type: string
      tmdb_api_key:
        type: string
      username:
        type: string
    type: object
  handler.storageAreaRequest:
    properties:
      enabled:
        type: boolean
      kind:
        $ref: '#/definitions/models.StorageAreaKind'
      path:
        type: string
    type: object
  handler.storageAreaResponse:
    properties:
      eligible_segments:
        type: boolean
      enabled:
        type: boolean
      error:
        type: string
      free_bytes:
        type: integer
      id:
        type: string
      kind:
        $ref: '#/definitions/models.StorageAreaKind'
      path:
        type: string
      status:
        type: string
      total_bytes:
        type: integer
      used_bytes:
        type: integer
      utilization_pct:
        type: number
    type: object
  handler.storageConfigRequest:
    properties:
      storage_min_free_bytes:
        type: string
    type: object
  handler.storageListResponse:
    properties:
      areas:
        items:
          $ref: '#/definitions/handler.storageAreaResponse'
        type: array
      storage_min_free_bytes:
        type: integer
    type: object
  handler.updateMeRequest:
    properties:
      email:
        type: string
      password:
        description: optional; omit to keep current
        type: string
      username:
        type: string
    type: object
  handler.updateWorkerRequest:
    properties:
      hwaccel:
        type: string
      threads:
        type: integer
    type: object
  handler.upsertHistoryRequest:
    properties:
      completed:
        type: boolean
      position:
        type: number
    type: object
  models.CastMember:
    properties:
      character:
        type: string
      name:
        type: string
      profile_path:
        type: string
    type: object
  models.EphemeralWorkerToken:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
  models.Library:
    properties:
      created_at:
        type: string
      id:
        type: string
      media_type:
        $ref: '#/definitions/models.MediaType'
      path:
        type: string
      updated_at:
        type: string
    type: object
  models.MediaItem:
    properties:
      audio_codec:
        type: string
      backdrop_path:
        type: string
      bundle_status:
        type: string
      cast:
        items:
          $ref: '#/definitions/models.CastMember'
        type: array
      created_at:
        type: string
      director:
        type: string
      duration:
        description: seconds
        type: number
      episode_number:
        type: integer
      extra_posters:
        items:
          type: string
        type: array
      file_path:
        type: string
      file_size:
        type: integer
      height:
        type: integer
      id:
        type: string
      library_id:
        type: string
      media_type:
        $ref: '#/definitions/models.MediaType'
      mpd_path:
        type: string
      overview:
        type: string
      poster_path:
        type: string
      season_number:
        type: integer
      source_fingerprint:
        type: string
      source_status:
        type: string
      title:
        type: string
      tmdb_id:
        description: Enriched metadata (nullable)
        type: integer
      transcode_progress:
        type: number
      transcode_sizes:
        $ref: '#/definitions/models.TranscodeSizesInfo'
      transcode_status:
        allOf:
        - $ref: '#/definitions/models.TranscodeStatus'
        description: Transcode
      tv_season_id:
        type: string
      tv_show_id:
        description: TV episode fields (nullable; populated only for MediaTypeEpisode
          items)
        type: string
      tv_show_title:
        type: string
      updated_at:
        type: string
      video_codec:
        type: string
      width:
        type: integer
      year:
        type: integer
    type: object
  models.MediaType:
    enum:
    - movie
    - tvshow
    - episode
    - music
    type: string
    x-enum-varnames:
    - MediaTypeMovie
    - MediaTypeTVShow
    - MediaTypeEpisode
    - MediaTypeMusic
  models.RenditionSize:
    properties:
      resolution:
        description: e.g., "360p", "480p", etc.
        type: string
      size:
        description: Total size of all files in the rendition directory in bytes
        type: integer
    type: object
  models.SearchResult:
    properties:
      cast:
        items:
          $ref: '#/definitions/models.CastMember'
        type: array
      director:
        type: string
      id:
        type: string
      media_type:
        description: '"movie" or "tvshow"'
        type: string
      overview:
        type: string
      poster_path:
        type: string
      title:
        type: string
      year:
        type: integer
    type: object
  models.StorageArea:
    properties:
      created_at:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      kind:
        $ref: '#/definitions/models.StorageAreaKind'
      path:
        type: string
      updated_at:
        type: string
    type: object
  models.StorageAreaKind:
    enum:
    - segments
    type: string
    x-enum-varnames:
    - StorageAreaKindSegments
  models.TVSeason:
    properties:
      created_at:
        type: string
      id:
        type: string
      overview:
        type: string
      poster_path:
        type: string
      season_number:
        type: integer
      tmdb_id:
        type: integer
      tv_show_id:
        type: string
      updated_at:
        type: string
    type: object
  models.TVShow:
    properties:
      backdrop_path:
        type: string
      cast:
        items:
          $ref: '#/definitions/models.CastMember'
        type: array
      created_at:
        type: string
      director:
        type: string
      extra_posters:
        items:
          type: string
        type: array
      first_air_year:
        type: integer
      id:
        type: string
      library_id:
        type: string
      name:
        type: string
      overview:
        type: string
      poster_path:
        type: string
      tmdb_id:
        type: integer
      updated_at:
        type: string
    type: object
  models.TranscodeJob:
    properties:
      created_at:
        type: string
      error_msg:
        type: string
      finished_at:
        type: string
      id:
        type: string
      media_item_id:
        type: string
      priority:
        type: integer
      progress:
        description: 0-100
        type: number
      started_at:
        type: string
      status:
        $ref: '#/definitions/models.TranscodeStatus'
      worker_id:
        type: string
    type: object
  models.TranscodeSizesInfo:
    properties:
      renditions:
        items:
          $ref: '#/definitions/models.RenditionSize'
        type: array
      total_size:
        type: integer
    type: object
  models.TranscodeStatus:
    enum:
    - none
    - pending
    - processing
    - done
    - failed
    type: string
    x-enum-varnames:
    - TranscodeStatusNone
    - TranscodeStatusPending
    - TranscodeStatusProcessing
    - TranscodeStatusDone
    - TranscodeStatusFailed
  models.TranscodeWorker:
    properties:
      api_key:
        type: string
      created_at:
        type: string
      hwaccel:
        type: string
      id:
        type: string
      is_ephemeral:
        type: boolean
      last_heartbeat:
        type: string
      name:
        type: string
      status:
        type: string
      threads:
        type: integer
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_admin:
        type: boolean
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.WatchHistory:
    properties:
      completed:
        type: boolean
      id:
        type: string
      media:
        $ref: '#/definitions/models.MediaItem'
      media_item_id:
        type: string
      position:
        description: seconds
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST & WebSocket API specification for Prism, a self-hosted media server.
  title: Prism Media Server API
  version: "1.0"
paths:
  /admin/artifacts/index:
    post:
      description: Scan all enabled segment storage areas for artifact artifact.json
        sidecar files to index them in the database.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.IndexResponse'
        "409":
          description: 'Conflict: Artifact schema not applied'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Index Artifacts
      tags:
      - Artifact Administration
  /admin/artifacts/relink:
    post:
      description: Perform deterministic fingerprint-based matching to link indexed
        transcode artifacts with existing media items in the database.
      produces:
      - application/json
      responses:
        "200":
          description: Returns link execution counts (linked, unmatched, ambiguous,
            invalid, skipped)
          schema:
            additionalProperties:
              type: integer
            type: object
        "409":
          description: 'Conflict: Artifact schema not applied'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Relink Artifacts
      tags:
      - Artifact Administration
  /admin/artifacts/status:
    get:
      description: Retrieve current health, unmatched, and ambiguous counts of indexed
        transcode artifacts across all storage areas.
      produces:
      - application/json
      responses:
        "200":
          description: Returns active artifact statuses, counts, and health statistics
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 'Conflict: Artifact schema not applied'
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Artifact Status
      tags:
      - Artifact Administration
  /admin/artifacts/write-sidecars:
    post:
      description: Iterate through all transcode-completed media items and generate
        artifact.json recovery sidecars on disk.
      produces:
      - application/json
      responses:
        "200":
          description: Returns write execution counts (written, skipped, errors)
          schema:
            additionalProperties:
              type: integer
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Write Sidecar Files
      tags:
      - Artifact Administration
  /admin/metadata/refresh:
    post:
      description: Clear metadata across all media items, TV shows, and TV seasons,
        and re-trigger bulk background TMDB metadata enrichment.
      produces:
      - application/json
      responses:
        "202":
          description: Returns status and count of cleared records
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Refresh All Metadata
      tags:
      - Metadata Administration
  /admin/settings:
    get:
      description: Retrieve a dictionary of all editable server setting keys and values.
      produces:
      - application/json
      responses:
        "200":
          description: Map of server configurations
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthenticated
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden (requires Admin status)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Server Settings (Admin Only)
      tags:
      - Admin Configuration
    put:
      consumes:
      - application/json
      description: Update one or more server setting values. Unknown keys return a
        bad request status.
      parameters:
      - description: Settings key-value pairs
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 'Returns {''status'': ''ok''}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body or unknown configuration key
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthenticated
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden (requires Admin status)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update Server Settings (Admin Only)
      tags:
      - Admin Configuration
  /admin/storage:
    get:
      description: Retrieve a list of all configured storage areas with path metrics
        (total, free, used bytes and utilization percentage).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.storageListResponse'
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List Storage Areas
      tags:
      - Storage Administration
  /admin/storage/areas:
    post:
      consumes:
      - application/json
      description: Register a new storage area for segments.
      parameters:
      - description: Storage area parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.storageAreaRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.StorageArea'
        "400":
          description: Invalid input or kind
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create Storage Area
      tags:
      - Storage Administration
  /admin/storage/areas/{id}:
    delete:
      description: Remove a storage area from the database. Note that files on disk
        are not deleted.
      parameters:
      - description: Storage Area ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete Storage Area
      tags:
      - Storage Administration
    put:
      consumes:
      - application/json
      description: Update path or enabled status of an existing storage area.
      parameters:
      - description: Storage Area ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Storage area parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.storageAreaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.StorageArea'
        "400":
          description: Invalid ID or request body
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Storage area not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update Storage Area
      tags:
      - Storage Administration
  /admin/storage/config:
    put:
      consumes:
      - application/json
      description: Update global storage settings, such as minimum free bytes required
        on disk.
      parameters:
      - description: Storage configuration parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.storageConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Returns {''status'': ''ok''}'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body or parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update Storage Configuration
      tags:
      - Storage Administration
  /admin/workers:
    get:
      description: Retrieve a list of all registered remote transcode workers.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.TranscodeWorker'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List Transcode Workers
      tags:
      - Worker Administration
    post:
      consumes:
      - application/json
      description: Register a new remote transcode worker. Returns the created worker
        metadata including its authentication secret key.
      parameters:
      - description: Worker parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createWorkerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.TranscodeWorker'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Register Transcode Worker
      tags:
      - Worker Administration
  /admin/workers/{id}:
    delete:
      description: De-register a remote transcode worker and invalidate its API credentials.
      parameters:
      - description: Worker ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Worker not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete Transcode Worker
      tags:
      - Worker Administration
    put:
      consumes:
      - application/json
      description: Update concurrency limits (threads) or hardware acceleration configuration
        for a registered worker.
      parameters:
      - description: Worker ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Worker settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateWorkerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TranscodeWorker'
        "400":
          description: Invalid ID or request body
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Worker not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update Transcode Worker Settings
      tags:
      - Worker Administration
  /admin/workers/ephemeral-tokens:
    get:
      description: Retrieve a list of all active ephemeral worker registration tokens.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.EphemeralWorkerToken'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List Ephemeral Worker Tokens
      tags:
      - Worker Administration
    post:
      consumes:
      - application/json
      description: Create a new re-usable registration token for ephemeral workers.
      parameters:
      - description: Token parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createEphemeralTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.EphemeralWorkerToken'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create Ephemeral Worker Token
      tags:
      - Worker Administration
  /admin/workers/ephemeral-tokens/{id}:
    delete:
      description: Revoke/delete an ephemeral worker registration token.
      parameters:
      - description: Token ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Token not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete Ephemeral Worker Token
      tags:
      - Worker Administration
  /auth/login:
    post:
      consumes:
      - application/json
      description: Validates user credentials, sets refresh token cookie, and returns
        a JWT access token.
      parameters:
      - description: Login credentials
