<div class="login-wrapper">
  <!-- Ambient background glow layers -->
  <div class="ambient-glow-1 login-glow-1"></div>
  <div class="ambient-glow-2 login-glow-2"></div>

  <!-- Centered Login Card -->
  <div class="login-container glass-card">
    <!-- Brand Logo header -->
    <div class="login-header">
      <img src="/prism-logo-animated.svg" class="login-logo" alt="Prism Logo" />
      <h1 class="prism-title">Prism</h1>
      <p class="prism-subtitle">Media Server</p>
    </div>

    <!-- Login credentials form -->
    <form (submit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username" class="label-mono">USERNAME</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon">person</span>
          <input
            #usernameInput
            type="text"
            id="username"
            name="username"
            [(ngModel)]="username"
            class="input-glass"
            placeholder="Enter your username"
            [disabled]="loading"
            required
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="label-mono">PASSWORD</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon">lock</span>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            class="input-glass"
            placeholder="Enter your password"
            [disabled]="loading"
            required
            autocomplete="current-password"
          />
        </div>
      </div>

      <!-- Error feedback banner -->
      <div *ngIf="error" class="error-container">
        <span class="material-symbols-outlined error-icon">error</span>
        <span class="error-text">{{ error }}</span>
      </div>

      <!-- Action Button -->
      <button type="submit" class="btn-primary login-btn" [disabled]="loading">
        <span *ngIf="!loading" class="btn-content">
          <span>Sign In</span>
          <span class="material-symbols-outlined">login</span>
        </span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>
  </div>
</div>
