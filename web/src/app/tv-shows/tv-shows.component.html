<div class="tv-container">
  <!-- Library Header -->
  <div class="library-header">
    <div class="header-text-container">
      <h2 class="library-title">TV Shows</h2>
      <p class="library-count">{{ shows.length }} titles available</p>
    </div>
  </div>

  <!-- Filters Bar -->
  <div class="filters-bar glass-card">
    <div class="filter-label-group">
      <span class="material-symbols-outlined filter-icon">filter_list</span>
      <span class="filter-label">Filter by:</span>
    </div>
    
    <div class="filter-pills">
      <button 
        class="filter-pill active">
        All Shows
      </button>
    </div>


    <div class="view-toggles">
      <span class="material-symbols-outlined view-icon active" style="font-variation-settings: 'FILL' 1;">grid_view</span>
      <span class="material-symbols-outlined view-icon">view_list</span>
    </div>
  </div>

  <!-- Loading & Error States -->
  <div *ngIf="loading" class="state-container">
    <div class="spinner"></div>
    <p class="state-text">Loading TV shows library...</p>
  </div>

  <div *ngIf="error" class="state-container">
    <span class="material-symbols-outlined error-icon">error</span>
    <p class="state-text">{{ error }}</p>
  </div>

  <!-- Empty Library State -->
  <div *ngIf="!loading && !error && shows.length === 0" class="state-container">
    <span class="material-symbols-outlined empty-icon">tv</span>
    <p class="state-text">No TV shows found in your libraries.</p>
  </div>

  <!-- TV Shows Grid -->
  <div *ngIf="!loading && !error && shows.length > 0" class="shows-grid">
    <div 
      *ngFor="let show of shows; trackBy: trackByShowId" 
      class="show-card" 
      [routerLink]="['/tv-shows', show.id]">
      
      <div class="poster-container">
        <img [src]="getShowPosterUrl(show)" alt="Show Poster" class="poster-img" />
        
        <!-- Hover Overlay -->
        <div class="poster-hover-overlay">
          <button class="info-btn" title="View Seasons">
            <span class="material-symbols-outlined">library_books</span>
          </button>
        </div>
      </div>

      <div class="poster-details">
        <h4 class="poster-title">{{ show.name }}</h4>
        <div class="poster-meta">
          <span class="label-mono">{{ show.first_air_year || 'N/A' }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
