<svg 
  viewBox="0 0 100 100" 
  width="100%" 
  height="100%" 
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Deep iridescent spiral gradient -->
    <linearGradient id="vortex-color" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="35%" stop-color="#6366f1" />
      <stop offset="70%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="core-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a5b4fc" />
    </linearGradient>
  </defs>

  <!-- Outer orbital light particles -->
  <g>
    <circle cx="50" cy="12" r="2.5" fill="#6366f1" opacity="0.8" style="filter: drop-shadow(0 0 6px #6366f1);" />
    <circle cx="88" cy="50" r="1.5" fill="#38bdf8" opacity="0.6" style="filter: drop-shadow(0 0 4px #38bdf8);" />
    <circle cx="50" cy="88" r="2" fill="#a855f7" opacity="0.8" style="filter: drop-shadow(0 0 6px #a855f7);" />
    <circle cx="12" cy="50" r="1" fill="#ec4899" opacity="0.5" />
  </g>

  <!-- Outer swirl helix track -->
  <circle 
    cx="50" 
    cy="50" 
    r="38" 
    fill="none" 
    stroke="url(#vortex-color)" 
    stroke-width="5" 
    stroke-linecap="round"
    stroke-dasharray="90 40 20 40" 
    style="filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.4));"
  />

  <!-- Inner contrary swirl helix track -->
  <circle 
    cx="50" 
    cy="50" 
    r="24" 
    fill="none" 
    stroke="url(#vortex-color)" 
    stroke-width="3.5" 
    stroke-linecap="round"
    stroke-dasharray="40 30 15 30" 
    style="filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.3));"
  />

  <!-- Glass prism core in the center of the vortex -->
  <polygon 
    points="50,33 35,61 65,61" 
    fill="url(#core-light)" 
    opacity="0.92"
    stroke="rgba(255, 255, 255, 0.85)"
    stroke-width="1.5"
    style="filter: drop-shadow(0 2px 8px rgba(255, 255, 255, 0.6));"
  />
  
  <!-- Rainbow sparkles breaking free from core -->
  <line x1="50" y1="48" x2="70" y2="35" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.7" />
  <line x1="43" y1="54" x2="25" y2="65" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round" opacity="0.7" />
</svg>
