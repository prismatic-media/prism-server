name: CI Pipeline

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build-test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: web

      - name: Run Tests
        run: npx ng test --watch=false
        working-directory: web

      - name: Build Frontend
        run: npm run build
        working-directory: web

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: web/dist
          retention-days: 1

  build-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    needs: [lint-backend, build-test-frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: web/dist

      - name: Run Tests
        run: go test -v ./...

      - name: Build Server Binary (Linux amd64)
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -v -o prism-linux-amd64 ./cmd/server

      - name: Build Server Binary (Linux arm64)
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -v -o prism-linux-arm64 ./cmd/server

      - name: Upload Release Binaries Artifact
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            prism-linux-amd64
            prism-linux-arm64
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-test-backend
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Tag Name
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
            VERSION=${LATEST_TAG#v}
            IFS='.' read -r major minor patch <<< "$VERSION"
            major=${major:-0}
            minor=${minor:-1}
            patch=${patch:-0}
            next_patch=$((patch + 1))
            echo "tag_name=v${major}.${minor}.${next_patch}" >> $GITHUB_OUTPUT
          fi

      - name: Download Binaries
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: |
            prism-linux-amd64
            prism-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
