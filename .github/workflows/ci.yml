name: CI Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: web

      - name: Run Prettier
        run: npx prettier --check .
        working-directory: web

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.3
          args: --timeout=5m

  build-test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: web

      - name: Run Tests
        run: npx vitest run
        working-directory: web

      - name: Build Frontend
        run: npm run build
        working-directory: web

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: web/dist
          retention-days: 1

  build-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    needs: [lint-backend, build-test-frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: web/dist

      - name: Run Tests
        run: go test -v ./...

      - name: Build Server Binary
        run: go build -v -o prism ./cmd/server

      - name: Build Worker Binary
        run: go build -v -o prism-worker ./cmd/worker

      - name: Upload Release Binaries Artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            prism
            prism-worker
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-test-backend
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Binaries
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prism
            prism-worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
